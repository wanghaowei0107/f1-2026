<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 2026 赛季中心</title>
<meta name="description" content="F1 2026 赛季信息中心 - 积分榜、赛程、天气、实时数据">
<meta name="theme-color" content="#E8002D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="F1 2026">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>

<header>
  <div>
    <div class="logo-text">F<span>1</span> 赛季</div>
  </div>
  <div class="season-badge">2026</div>
  <div class="header-right">
    <select id="season-select" onchange="switchSeason(this.value)" style="font-size:0.7rem;padding:4px 8px;border:1px solid var(--border);border-radius:2px;background:var(--surface);color:var(--text);cursor:pointer;">
      <option value="2026" selected>2026</option>
      <option value="2025">2025</option>
      <option value="2024">2024</option>
      <option value="2023">2023</option>
    </select>
    <div class="last-update" id="last-update">数据加载中...</div>
    <button class="theme-toggle" onclick="toggleTheme()" title="切换深色模式" aria-label="切换深色模式">☀</button>
  </div>
</header>

<div id="offline-banner" style="display:none;background:var(--warning);color:#000;text-align:center;padding:8px;font-size:0.8rem;">
  您当前处于离线状态，数据可能不是最新的
</div>

<main>

    <!-- LIVE banner placeholder -->
    <div id="live-banner"></div>

    <div class="next-race-block">
      <div class="nr-label">下一站</div>
      <div class="nr-name" id="nr-name">加载中...</div>
      <div class="nr-date" id="nr-date"></div>
      <div class="countdown-row">
        <div class="cd-unit"><div class="cd-num" id="cd-d">--</div><div class="cd-label">天</div></div>
        <div class="cd-unit"><div class="cd-num" id="cd-h">--</div><div class="cd-label">时</div></div>
        <div class="cd-unit"><div class="cd-num" id="cd-m">--</div><div class="cd-label">分</div></div>
        <div class="cd-unit"><div class="cd-num" id="cd-s">--</div><div class="cd-label">秒</div></div>
      </div>
    </div>

    <div class="two-col">

      <div class="col-standings">
        <div class="section-title">积分榜</div>
        <div class="standings-tabs">
          <button class="s-tab active" onclick="showStandings('drivers', this)">车手</button>
          <button class="s-tab" onclick="showStandings('constructors', this)">车队</button>
          <button class="refresh-btn" onclick="loadStandings(true)" style="margin:0;margin-left:auto;">↻ 刷新</button>
        </div>
        <div id="standings-drivers" class="standings-list">
          <div class="loading">从 Jolpica API 加载中...</div>
        </div>
        <div id="standings-constructors" class="standings-list" style="display:none">
          <div class="loading">从 Jolpica API 加载中...</div>
        </div>
      </div>

      <div class="col-schedule">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;">
          <div class="section-title" style="margin-bottom:0;">赛程</div>
          <button class="ics-btn" onclick="exportICS()">导出日历 .ics</button>
        </div>
        <div class="schedule-list" id="schedule-list">
          <div class="loading">加载赛程中...</div>
        </div>
      </div>

    </div>

    <div class="chart-container">
      <div class="chart-header">
        <div class="section-title" style="margin-bottom:0;">积分趋势</div>
        <div class="chart-tabs">
          <button class="s-tab active" onclick="drawChart('drivers', this)">车手 Top 8</button>
          <button class="s-tab" onclick="drawChart('constructors', this)">车队</button>
          <button class="s-tab" id="compare-btn" onclick="toggleCompare()">对比</button>
        </div>
      </div>
      <canvas class="chart-canvas" id="chart-canvas"></canvas>
    </div>

</main>

<script type="module" src="js/app.js"></script>
</body>
</html>
