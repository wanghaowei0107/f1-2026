<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 2026 赛季中心</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E8002D;
    --red-dark: #a8001f;
    --bg: #f5f5f3;
    --surface: #ffffff;
    --surface2: #f0efed;
    --border: rgba(0,0,0,0.09);
    --text: #111111;
    --muted: #888;
    --accent: #E8002D;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    padding: 2rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1.5rem;
    position: relative;
    max-width: 1280px;
    margin: 0 auto;
  }
  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 6vw, 4rem);
    letter-spacing: 0.04em;
    line-height: 1;
    color: #111;
  }
  .logo-text span { color: var(--red); }
  .season-badge {
    background: var(--red);
    color: #fff;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    padding: 4px 10px;
    border-radius: 2px;
    align-self: flex-end;
    margin-bottom: 0.5rem;
  }
  .header-right {
    margin-left: auto;
    text-align: right;
  }
  .last-update {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* NAV TABS - removed */

  /* SECTION TITLES */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.06em;
    margin-bottom: 1rem;
    color: #111;
  }

  /* CONTENT */
  main {
    padding: 1.5rem 2rem 4rem;
    max-width: 1280px;
    margin: 0 auto;
  }
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    align-items: start;
  }

  /* COUNTDOWN */
  .next-race-block {
    margin-bottom: 2rem;
    padding: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--red);
    border-radius: 4px;
  }
  .nr-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 0.5rem;
    font-weight: 500;
  }
  .nr-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    letter-spacing: 0.04em;
    line-height: 1;
    margin-bottom: 0.25rem;
  }
  .nr-date { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.25rem; }
  .countdown-row { display: flex; gap: 1rem; flex-wrap: wrap; }
  .cd-unit {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.75rem 1rem;
    text-align: center;
    min-width: 64px;
  }
  .cd-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 0.04em;
    line-height: 1;
    color: #111;
  }
  .cd-label { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }

  /* SCHEDULE */
  .schedule-list { display: flex; flex-direction: column; gap: 6px; }
  .race-row {
    display: grid;
    grid-template-columns: 36px 28px 1fr auto auto;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    transition: background 0.15s;
  }
  .race-row:hover { background: var(--surface2); }
  .race-row.is-past { opacity: 0.35; }
  .race-row.is-next { border-left: 2px solid var(--red); }
  .rr-round { font-size: 0.65rem; color: var(--muted); font-weight: 500; letter-spacing: 0.05em; }
  .rr-flag { font-size: 1.1rem; }
  .rr-name { font-size: 0.88rem; font-weight: 400; }
  .rr-date { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
  .sprint-pill {
    font-size: 0.6rem; font-weight: 500; letter-spacing: 0.08em;
    background: rgba(186,117,23,0.12); color: #9a6000;
    padding: 2px 7px; border-radius: 2px; white-space: nowrap;
  }
  .status-pill {
    font-size: 0.65rem; font-weight: 500; letter-spacing: 0.06em;
    padding: 2px 8px; border-radius: 2px; white-space: nowrap;
  }
  .status-done { background: rgba(0,0,0,0.05); color: var(--muted); }
  .status-next { background: rgba(232,0,45,0.1); color: var(--red); }
  .status-cancelled { background: rgba(255,100,0,0.08); color: #cc5200; }

  /* STANDINGS */
  .standings-tabs { display: flex; gap: 8px; margin-bottom: 1.25rem; align-items: center; }
  .s-tab {
    font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 6px 14px; border-radius: 2px; cursor: pointer;
    background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    transition: all 0.15s;
  }
  .s-tab:hover { color: var(--text); }
  .s-tab.active { background: var(--red); color: #fff; border-color: var(--red); }

  .standings-list { display: flex; flex-direction: column; gap: 5px; }
  .driver-row, .cons-row {
    display: grid;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .driver-row { grid-template-columns: 28px 24px 1fr 130px 44px; }
  .cons-row { grid-template-columns: 28px 12px 1fr 130px 44px; }
  .st-pos { font-size: 0.75rem; color: var(--muted); font-weight: 500; text-align: center; }
  .st-pos.gold { color: #c47f00; }
  .st-pos.silver { color: #666; }
  .st-pos.bronze { color: #a0522d; }
  .st-flag { font-size: 1rem; }
  .st-name { font-size: 0.88rem; font-weight: 400; }
  .st-team { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
  .bar-track {
    height: 4px; background: rgba(0,0,0,0.07); border-radius: 2px; overflow: hidden;
  }
  .bar-fill { height: 100%; border-radius: 2px; }
  .st-pts { font-size: 0.95rem; font-weight: 500; text-align: right; }

  .cons-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* Loading */
  .loading { color: var(--muted); font-size: 0.85rem; padding: 2rem 0; }
  .error-msg { color: #ff6464; font-size: 0.82rem; padding: 1rem 0; }

  .refresh-btn {
    font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500;
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 5px 12px; border-radius: 2px; cursor: pointer; margin-bottom: 1rem;
    transition: all 0.15s;
  }
  .refresh-btn:hover { border-color: var(--red); color: var(--text); }

  /* RACE DETAIL */
  .race-row.clickable { cursor: pointer; }
  .race-detail {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 4px 4px;
    padding: 1rem 14px;
    margin-top: -6px;
    margin-bottom: 2px;
  }
  .detail-section { margin-bottom: 1rem; }
  .detail-section:last-child { margin-bottom: 0; }
  .detail-label {
    font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--red); font-weight: 500; margin-bottom: 0.5rem;
  }
  .result-table {
    width: 100%; border-collapse: collapse; font-size: 0.8rem;
  }
  .result-table th {
    text-align: left; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); font-weight: 500; padding: 4px 6px; border-bottom: 1px solid var(--border);
  }
  .result-table td {
    padding: 5px 6px; border-bottom: 1px solid rgba(0,0,0,0.04);
  }
  .result-table tr:last-child td { border-bottom: none; }
  .result-table .pos-1 td:first-child { color: #c47f00; font-weight: 500; }
  .result-table .pos-2 td:first-child { color: #666; font-weight: 500; }
  .result-table .pos-3 td:first-child { color: #a0522d; font-weight: 500; }
  .result-table .team-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle;
  }
  .detail-loading { color: var(--muted); font-size: 0.8rem; padding: 0.5rem 0; }

  @media (max-width: 860px) {
    .two-col { grid-template-columns: 1fr; }
  }
  @media (max-width: 560px) {
    header { padding: 1.25rem; }
    main { padding: 1rem 1rem 3rem; }
    .driver-row { grid-template-columns: 24px 22px 1fr 90px 36px; }
    .cons-row { grid-template-columns: 24px 10px 1fr 90px 36px; }
    .race-row { grid-template-columns: 28px 24px 1fr auto; }
    .sprint-pill { display: none; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-text">F<span>1</span> 赛季</div>
  </div>
  <div class="season-badge">2026</div>
  <div class="header-right">
    <div class="last-update" id="last-update">数据加载中...</div>
  </div>
</header>


<main>

    <div class="next-race-block">
      <div class="nr-label">下一站</div>
      <div class="nr-name" id="nr-name">加载中...</div>
      <div class="nr-date" id="nr-date"></div>
      <div class="countdown-row">
        <div class="cd-unit"><div class="cd-num" id="cd-d">--</div><div class="cd-label">天</div></div>
        <div class="cd-unit"><div class="cd-num" id="cd-h">--</div><div class="cd-label">时</div></div>
        <div class="cd-unit"><div class="cd-num" id="cd-m">--</div><div class="cd-label">分</div></div>
        <div class="cd-unit"><div class="cd-num" id="cd-s">--</div><div class="cd-label">秒</div></div>
      </div>
    </div>

    <div class="two-col">

      <div class="col-standings">
        <div class="section-title">积分榜</div>
        <div class="standings-tabs">
          <button class="s-tab active" onclick="showStandings('drivers', this)">车手</button>
          <button class="s-tab" onclick="showStandings('constructors', this)">车队</button>
          <button class="refresh-btn" onclick="loadStandings(true)" style="margin:0;margin-left:auto;">↻ 刷新</button>
        </div>
        <div id="standings-drivers" class="standings-list">
          <div class="loading">从 Jolpica API 加载中...</div>
        </div>
        <div id="standings-constructors" class="standings-list" style="display:none">
          <div class="loading">从 Jolpica API 加载中...</div>
        </div>
      </div>

      <div class="col-schedule">
        <div class="section-title">赛程</div>
        <div class="schedule-list" id="schedule-list">
          <div class="loading">加载赛程中...</div>
        </div>
      </div>

    </div>

</main>

<script>
// ─── RACE DATA ──────────────────────────────────────────────────────────────
const races = [
  { r:1,  name:'澳大利亚大奖赛',       flag:'🇦🇺', date:'2026-03-08', end:'2026-03-08', sprint:false, cancelled:false },
  { r:2,  name:'中国大奖赛',           flag:'🇨🇳', date:'2026-03-13', end:'2026-03-15', sprint:true,  cancelled:false },
  { r:3,  name:'日本大奖赛',           flag:'🇯🇵', date:'2026-03-27', end:'2026-03-29', sprint:false, cancelled:false },
  { r:4,  name:'巴林大奖赛',           flag:'🇧🇭', date:'2026-04-12', end:'2026-04-12', sprint:false, cancelled:true  },
  { r:5,  name:'沙特阿拉伯大奖赛',     flag:'🇸🇦', date:'2026-04-19', end:'2026-04-19', sprint:false, cancelled:true  },
  { r:6,  name:'迈阿密大奖赛',         flag:'🇺🇸', date:'2026-05-01', end:'2026-05-03', sprint:true,  cancelled:false },
  { r:7,  name:'加拿大大奖赛',         flag:'🇨🇦', date:'2026-05-22', end:'2026-05-24', sprint:true,  cancelled:false },
  { r:8,  name:'摩纳哥大奖赛',         flag:'🇲🇨', date:'2026-06-05', end:'2026-06-07', sprint:false, cancelled:false },
  { r:9,  name:'巴塞罗那大奖赛',       flag:'🇪🇸', date:'2026-06-12', end:'2026-06-14', sprint:false, cancelled:false },
  { r:10, name:'奥地利大奖赛',         flag:'🇦🇹', date:'2026-06-26', end:'2026-06-28', sprint:false, cancelled:false },
  { r:11, name:'英国大奖赛',           flag:'🇬🇧', date:'2026-07-03', end:'2026-07-05', sprint:true,  cancelled:false },
  { r:12, name:'比利时大奖赛',         flag:'🇧🇪', date:'2026-07-17', end:'2026-07-19', sprint:false, cancelled:false },
  { r:13, name:'匈牙利大奖赛',         flag:'🇭🇺', date:'2026-07-24', end:'2026-07-26', sprint:false, cancelled:false },
  { r:14, name:'荷兰大奖赛',           flag:'🇳🇱', date:'2026-08-21', end:'2026-08-23', sprint:true,  cancelled:false },
  { r:15, name:'意大利大奖赛',         flag:'🇮🇹', date:'2026-09-04', end:'2026-09-06', sprint:false, cancelled:false },
  { r:16, name:'西班牙大奖赛(马德里)', flag:'🇪🇸', date:'2026-09-11', end:'2026-09-13', sprint:false, cancelled:false },
  { r:17, name:'阿塞拜疆大奖赛',       flag:'🇦🇿', date:'2026-09-25', end:'2026-09-27', sprint:false, cancelled:false },
  { r:18, name:'新加坡大奖赛',         flag:'🇸🇬', date:'2026-10-02', end:'2026-10-04', sprint:true,  cancelled:false },
  { r:19, name:'美国大奖赛',           flag:'🇺🇸', date:'2026-10-16', end:'2026-10-18', sprint:false, cancelled:false },
  { r:20, name:'墨西哥大奖赛',         flag:'🇲🇽', date:'2026-10-23', end:'2026-10-25', sprint:false, cancelled:false },
  { r:21, name:'巴西大奖赛',           flag:'🇧🇷', date:'2026-10-30', end:'2026-11-01', sprint:false, cancelled:false },
  { r:22, name:'拉斯维加斯大奖赛',     flag:'🇺🇸', date:'2026-11-21', end:'2026-11-21', sprint:false, cancelled:false },
  { r:23, name:'卡塔尔大奖赛',         flag:'🇶🇦', date:'2026-11-27', end:'2026-11-29', sprint:false, cancelled:false },
  { r:24, name:'阿布扎比大奖赛',       flag:'🇦🇪', date:'2026-12-04', end:'2026-12-06', sprint:false, cancelled:false },
];

const teamColors = {
  'Mercedes': '#00D2BE', 'Ferrari': '#E8002D', 'McLaren': '#FF8000',
  'Red Bull': '#3671C6', 'Haas': '#B6BABD', 'Alpine': '#0093CC',
  'Racing Bulls': '#6692FF', 'Audi': '#BB9966', 'Williams': '#00A3E0',
  'Aston Martin': '#358C75', 'Cadillac': '#CC0000',
};
function teamColor(name) {
  for (const k in teamColors) if (name && name.includes(k)) return teamColors[k];
  return '#888';
}

// ─── TABS ───────────────────────────────────────────────────────────────────
function showStandings(type, btn) {
  document.getElementById('standings-drivers').style.display = type === 'drivers' ? 'flex' : 'none';
  document.getElementById('standings-constructors').style.display = type === 'constructors' ? 'flex' : 'none';
  document.getElementById('standings-drivers').style.flexDirection = 'column';
  document.getElementById('standings-constructors').style.flexDirection = 'column';
  document.querySelectorAll('.s-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
}

// ─── SCHEDULE ───────────────────────────────────────────────────────────────
function buildSchedule() {
  const today = new Date().toISOString().slice(0, 10);
  let nextSet = false;
  const list = document.getElementById('schedule-list');
  list.innerHTML = '';

  let nextRace = null;
  for (const rc of races) {
    if (!rc.cancelled && rc.end >= today && !nextSet) { nextRace = rc; nextSet = true; }
  }

  if (nextRace) {
    document.getElementById('nr-name').textContent = nextRace.name;
    const sd = new Date(nextRace.date);
    const ed = new Date(nextRace.end);
    const fmt = d => d.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' });
    document.getElementById('nr-date').textContent =
      `${fmt(sd)} — ${ed.getDate()}日 · ${nextRace.flag}`;
    startCountdown(new Date(nextRace.date + 'T06:00:00Z'));
  } else {
    document.getElementById('nr-name').textContent = '赛季已结束';
    document.getElementById('nr-date').textContent = '期待2027赛季';
  }

  races.forEach(rc => {
    const isPast = rc.end < today;
    const isNext = nextRace && rc.r === nextRace.r;
    const div = document.createElement('div');
    div.className = 'race-row' + (isPast && !rc.cancelled ? ' is-past clickable' : '') + (isNext ? ' is-next' : '');

    const d = new Date(rc.date);
    const dateStr = d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });

    let statusHtml = '';
    if (rc.cancelled) {
      statusHtml = '<span class="status-pill status-cancelled">已取消</span>';
    } else if (isPast) {
      statusHtml = '<span class="status-pill status-done">已完赛</span>';
    } else if (isNext) {
      statusHtml = '<span class="status-pill status-next">下一站</span>';
    }

    div.innerHTML = `
      <span class="rr-round">R${rc.r}</span>
      <span class="rr-flag">${rc.flag}</span>
      <div>
        <div class="rr-name">${rc.name}</div>
      </div>
      ${rc.sprint ? '<span class="sprint-pill">冲刺</span>' : '<span></span>'}
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="rr-date">${dateStr}</span>
        ${statusHtml}
      </div>
    `;

    if (isPast && !rc.cancelled) {
      div.addEventListener('click', () => toggleRaceDetail(rc, div));
    }

    list.appendChild(div);
  });
}

// ─── COUNTDOWN ──────────────────────────────────────────────────────────────
let countdownInterval;
function startCountdown(target) {
  clearInterval(countdownInterval);
  function tick() {
    const diff = target - Date.now();
    if (diff <= 0) {
      ['cd-d','cd-h','cd-m','cd-s'].forEach(id => document.getElementById(id).textContent = '0');
      return;
    }
    document.getElementById('cd-d').textContent = Math.floor(diff / 86400000);
    document.getElementById('cd-h').textContent = String(Math.floor((diff % 86400000) / 3600000)).padStart(2,'0');
    document.getElementById('cd-m').textContent = String(Math.floor((diff % 3600000) / 60000)).padStart(2,'0');
    document.getElementById('cd-s').textContent = String(Math.floor((diff % 60000) / 1000)).padStart(2,'0');
  }
  tick();
  countdownInterval = setInterval(tick, 1000);
}

// ─── STANDINGS via Jolpica API ───────────────────────────────────────────────
let standingsLoaded = false;

async function loadStandings(force) {
  if (standingsLoaded && !force) return;
  standingsLoaded = true;

  const BASE = 'https://api.jolpi.ca/ergast/f1/2026';

  // Driver standings
  try {
    const res = await fetch(`${BASE}/driverStandings.json`);
    const data = await res.json();
    const list = data.MRData.StandingsTable.StandingsLists[0];
    if (list) {
      renderDrivers(list.DriverStandings);
      document.getElementById('last-update').textContent =
        `积分更新至第${list.round}站 · ${new Date().toLocaleDateString('zh-CN')}`;
    }
  } catch(e) {
    document.getElementById('standings-drivers').innerHTML =
      '<div class="error-msg">加载失败，请检查网络后点击刷新</div>';
  }

  // Constructor standings
  try {
    const res2 = await fetch(`${BASE}/constructorStandings.json`);
    const data2 = await res2.json();
    const list2 = data2.MRData.StandingsTable.StandingsLists[0];
    if (list2) renderConstructors(list2.ConstructorStandings);
  } catch(e) {
    document.getElementById('standings-constructors').innerHTML =
      '<div class="error-msg">加载失败，请检查网络后点击刷新</div>';
  }
}

function posClass(p) {
  return p === 1 ? 'gold' : p === 2 ? 'silver' : p === 3 ? 'bronze' : '';
}

function renderDrivers(standings) {
  const el = document.getElementById('standings-drivers');
  el.innerHTML = '';
  const maxPts = parseFloat(standings[0]?.points || 1);
  standings.forEach(s => {
    const pos = parseInt(s.position);
    const pts = parseFloat(s.points);
    const pct = Math.round((pts / maxPts) * 100);
    const color = teamColor(s.Constructors[0]?.name);
    const d = s.Driver;
    const flag = driverFlag(d.nationality);
    const row = document.createElement('div');
    row.className = 'driver-row';
    row.innerHTML = `
      <span class="st-pos ${posClass(pos)}">${pos}</span>
      <span class="st-flag">${flag}</span>
      <div>
        <div class="st-name">${d.givenName} ${d.familyName}</div>
        <div class="st-team">${s.Constructors[0]?.name || ''}</div>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="st-pts">${pts}</span>
    `;
    el.appendChild(row);
  });
}

function renderConstructors(standings) {
  const el = document.getElementById('standings-constructors');
  el.innerHTML = '';
  const maxPts = parseFloat(standings[0]?.points || 1);
  standings.forEach(s => {
    const pos = parseInt(s.position);
    const pts = parseFloat(s.points);
    const pct = maxPts > 0 ? Math.round((pts / maxPts) * 100) : 0;
    const color = teamColor(s.Constructor.name);
    const row = document.createElement('div');
    row.className = 'cons-row';
    row.innerHTML = `
      <span class="st-pos ${posClass(pos)}">${pos}</span>
      <div class="cons-dot" style="background:${color}"></div>
      <div class="st-name">${s.Constructor.name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="st-pts">${pts}</span>
    `;
    el.appendChild(row);
  });
}

// ─── RACE DETAIL ───────────────────────────────────────────────────────────
const detailCache = {};

function toggleRaceDetail(rc, rowEl) {
  const existing = rowEl.nextElementSibling;
  if (existing && existing.classList.contains('race-detail')) {
    existing.remove();
    return;
  }
  const detail = document.createElement('div');
  detail.className = 'race-detail';
  detail.innerHTML = '<div class="detail-loading">加载成绩中...</div>';
  rowEl.after(detail);
  loadRaceDetail(rc, detail);
}

async function loadRaceDetail(rc, el) {
  const round = rc.r;
  const key = `r${round}`;
  if (detailCache[key]) { renderDetail(detailCache[key], rc, el); return; }

  const BASE = `https://api.jolpi.ca/ergast/f1/2026/${round}`;
  const data = {};

  const fetches = [
    fetch(`${BASE}/qualifying.json`).then(r=>r.json()).then(d => {
      const races = d.MRData?.RaceTable?.Races;
      if (races?.[0]?.QualifyingResults) data.qualifying = races[0].QualifyingResults;
    }).catch(()=>{}),
    fetch(`${BASE}/results.json`).then(r=>r.json()).then(d => {
      const races = d.MRData?.RaceTable?.Races;
      if (races?.[0]?.Results) data.race = races[0].Results;
    }).catch(()=>{}),
  ];

  if (rc.sprint) {
    fetches.push(
      fetch(`${BASE}/sprint.json`).then(r=>r.json()).then(d => {
        const races = d.MRData?.RaceTable?.Races;
        if (races?.[0]?.SprintResults) data.sprint = races[0].SprintResults;
      }).catch(()=>{})
    );
  }

  await Promise.all(fetches);
  detailCache[key] = data;
  renderDetail(data, rc, el);
}

function renderDetail(data, rc, el) {
  let html = '';

  if (data.qualifying) {
    html += `<div class="detail-section"><div class="detail-label">排位赛</div>`;
    html += `<table class="result-table"><tr><th>P</th><th>车手</th><th>车队</th><th>Q1</th><th>Q2</th><th>Q3</th></tr>`;
    data.qualifying.slice(0, 10).forEach(q => {
      const pos = parseInt(q.position);
      const cls = pos <= 3 ? `pos-${pos}` : '';
      const color = teamColor(q.Constructor?.name);
      html += `<tr class="${cls}"><td>${q.position}</td><td>${q.Driver.code}</td>
        <td><span class="team-dot" style="background:${color}"></span>${q.Constructor?.name||''}</td>
        <td>${q.Q1||'-'}</td><td>${q.Q2||'-'}</td><td>${q.Q3||'-'}</td></tr>`;
    });
    html += `</table></div>`;
  }

  if (data.sprint) {
    html += `<div class="detail-section"><div class="detail-label">冲刺赛</div>`;
    html += `<table class="result-table"><tr><th>P</th><th>车手</th><th>车队</th><th>成绩/状态</th><th>积分</th></tr>`;
    data.sprint.slice(0, 10).forEach(s => {
      const pos = parseInt(s.position);
      const cls = pos <= 3 ? `pos-${pos}` : '';
      const color = teamColor(s.Constructor?.name);
      const time = s.Time?.time || s.status || '-';
      html += `<tr class="${cls}"><td>${s.position}</td><td>${s.Driver.code}</td>
        <td><span class="team-dot" style="background:${color}"></span>${s.Constructor?.name||''}</td>
        <td>${time}</td><td>${s.points}</td></tr>`;
    });
    html += `</table></div>`;
  }

  if (data.race) {
    html += `<div class="detail-section"><div class="detail-label">正赛</div>`;
    html += `<table class="result-table"><tr><th>P</th><th>车手</th><th>车队</th><th>成绩/状态</th><th>积分</th></tr>`;
    data.race.slice(0, 10).forEach(r => {
      const pos = parseInt(r.position);
      const cls = pos <= 3 ? `pos-${pos}` : '';
      const color = teamColor(r.Constructor?.name);
      const time = r.Time?.time || r.status || '-';
      html += `<tr class="${cls}"><td>${r.position}</td><td>${r.Driver.code}</td>
        <td><span class="team-dot" style="background:${color}"></span>${r.Constructor?.name||''}</td>
        <td>${time}</td><td>${r.points}</td></tr>`;
    });
    html += `</table></div>`;
  }

  if (!html) html = '<div class="detail-loading">暂无成绩数据</div>';
  el.innerHTML = html;
}
